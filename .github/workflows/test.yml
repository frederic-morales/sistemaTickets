name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: support_tickets
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: bun install

      - name: Ejecutar migraciones
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/support_tickets
          BETTER_AUTH_SECRET: supersecreto1234567890123456789012
          BETTER_AUTH_URL: http://localhost:3000
          PORT: 3000
        run: bun run db:migrate

      - name: Iniciar backend en background
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/support_tickets
          BETTER_AUTH_SECRET: supersecreto1234567890123456789012
          BETTER_AUTH_URL: http://localhost:3000
          PORT: 3000
        run: bun run src/index.ts &

      - name: Esperar que el backend esté listo
        run: sleep 3

      - name: Ejecutar tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/support_tickets
          BETTER_AUTH_SECRET: supersecreto1234567890123456789012
          BETTER_AUTH_URL: http://localhost:3000
          PORT: 3000
        run: bun test