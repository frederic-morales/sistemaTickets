services:
  postgres:
    image: postgres:15
    container_name: postgres-tickets
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: support_tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend-tickets
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/support_tickets
      BETTER_AUTH_SECRET: supersecreto1234567890123456789012
      BETTER_AUTH_URL: http://localhost:3000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bun run db:migrate && bun run src/index.ts"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend-tickets
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: